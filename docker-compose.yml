version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wg_split
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  maildev:
    image: maildev/maildev:2
    ports:
      - "1080:1080"
      - "1025:1025"
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wg_split
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changemechangemechangeme123456}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-magiclsecretchangeme123456}
      WEB_APP_URL: http://localhost:5173
    ports:
      - "3333:3333"
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/jobs/worker.js"]
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wg_split
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changemechangemechangeme123456}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-magiclsecretchangeme123456}
      WEB_APP_URL: http://localhost:5173
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:4173"
    environment:
      VITE_API_URL: http://localhost:3333
volumes:
  postgres-data:
